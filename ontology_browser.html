      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>ZMAP Cell Type Hierarchy</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
          --bg: #0B0F19;
          --bg-surface: #1E293B;
          --border: #334155;
          --text-muted: #64748B;
          --text-secondary: #94A3B8;
          --text-body: #CBD5E1;
          --text-primary: #E2E8F0;
          --text-bright: #F1F5F9;
          --text-stroke: #0B0F19;
          --guide-band: #1E293B;
          --guide-label: #334155;
          --shadow: rgba(0,0,0,0.5);
          --node-default: #64748B;
          --link-default: #334155;
          --root-fill: #1E293B;
          --root-stroke: #475569;
        }

        body.light {
          --bg: #F8FAFC;
          --bg-surface: #FFFFFF;
          --border: #E2E8F0;
          --text-muted: #94A3B8;
          --text-secondary: #64748B;
          --text-body: #475569;
          --text-primary: #1E293B;
          --text-bright: #0F172A;
          --text-stroke: #F8FAFC;
          --guide-band: #E2E8F0;
          --guide-label: #94A3B8;
          --shadow: rgba(0,0,0,0.1);
          --node-default: #94A3B8;
          --link-default: #CBD5E1;
          --root-fill: #FFFFFF;
          --root-stroke: #94A3B8;
        }

        body {
          background: var(--bg);
          color: var(--text-primary);
          font-family: Helvetica, Arial, sans-serif;
          overflow: hidden;
          height: 100vh;
          transition: background 0.3s, color 0.3s;
        }

        #header {
          position: fixed; top: 0; left: 0; right: 0; z-index: 10;
          padding: 16px 28px;
          background: linear-gradient(180deg, var(--bg) 60%, transparent);
          display: flex; align-items: center; gap: 16px;
        }
        #header h1 {
          font-size: 18px; font-weight: 600; letter-spacing: 0.02em;
          color: var(--text-bright);
        }
        #header .subtitle {
          font-size: 12px; font-weight: 300; color: var(--text-muted);
        }

        #legend {
          position: fixed; bottom: 20px; left: 28px; z-index: 10;
          display: flex; gap: 14px; flex-wrap: wrap;
        }
        .legend-item {
          display: flex; align-items: center; gap: 6px;
          font-size: 11px; font-weight: 500; color: var(--text-secondary);
          text-transform: capitalize;
        }
        .legend-dot {
          width: 10px; height: 10px; border-radius: 50%;
        }

        #tooltip {
          position: fixed; pointer-events: none; z-index: 100;
          background: var(--bg-surface); border: 1px solid var(--border);
          border-radius: 8px; padding: 10px 14px;
          font-size: 12px; color: var(--text-body);
          box-shadow: 0 8px 32px var(--shadow);
          opacity: 0; transition: opacity 0.15s;
          max-width: 300px;
        }
        #tooltip .tt-name {
          font-weight: 600; color: var(--text-bright); margin-bottom: 6px;
          font-size: 13px;
        }
        #tooltip .tt-crumb {
          font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;
        }
        #tooltip .tt-row {
          padding: 1px 0;
        }
        #tooltip .tt-level {
          font-size: 9px; color: var(--text-muted); text-transform: uppercase;
          letter-spacing: 0.04em; margin-right: 5px;
        }
        #tooltip .tt-info {
          font-size: 11px; color: var(--text-secondary);
        }

        #controls {
          position: fixed; top: 16px; right: 28px; z-index: 10;
          display: flex; gap: 8px;
        }
        .ctrl-btn {
          background: var(--bg-surface); border: 1px solid var(--border);
          color: var(--text-secondary); border-radius: 6px;
          padding: 6px 12px; font-size: 11px; cursor: pointer;
          transition: all 0.15s;
        }
        .ctrl-btn:hover { background: var(--border); color: var(--text-primary); }

        svg { cursor: grab; }
        svg:active { cursor: grabbing; }

        .link {
          fill: none;
          stroke-opacity: 0.25;
          stroke-width: 2.4px;
        }

        .node circle {
          stroke-width: 1.5px;
          cursor: pointer;
          transition: r 0.15s;
        }
        .node circle:hover {
          filter: brightness(1.3);
        }

        .node text {
          font-family: Helvetica, Arial, sans-serif;
          font-size: 11px;
          fill: var(--text-secondary);
          pointer-events: none;
          paint-order: stroke fill;
          stroke: var(--text-stroke);
          stroke-width: 3px;
        }
        .zooming .node text {
          visibility: hidden;
        }
        .guide-band {
          fill: var(--guide-band);
          fill-opacity: 0.35;
          stroke: none;
        }
        .guide-label {
          font-family: Helvetica, Arial, sans-serif;
          font-size: 10px;
          fill: var(--guide-label);
          text-anchor: middle;
        }
      </style>
      </head>

      </div>

      const colorMap  = {"neurectoderm": "#3B82F6", "ectoderm": "#22C55E", "mesoderm": "#EF4444", "endoderm": "#F97316", "germline": "#A855F7"};
